<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Sign in — Curriculum Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500;6..72,600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="shared.css">
<style>
  body { background: var(--navy); }
  .split {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px 24px;
  }

  /* ===== LEFT — Brand panel ===== */
  .brand-side {
    background: var(--navy);
    background-image:
      radial-gradient(circle at 100% 0%, rgba(224,163,62,0.10), transparent 50%),
      radial-gradient(circle at 0% 100%, rgba(45,90,158,0.32), transparent 55%);
    color: white;
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
  }
  .brand-side::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
    background-size: 56px 56px;
    background-position: -1px -1px;
    pointer-events: none;
  }
  .brand-side > * { position: relative; }
  .brand-lockup {
    display: flex; align-items: center; gap: 12px;
  }
  .brand-lockup .mark {
    width: 36px; height: 36px;
    background: white;
    border-radius: 7px;
    display: grid; place-items: center;
    font-family: 'Newsreader', serif;
    color: var(--navy);
    font-weight: 600;
    font-size: 20px;
  }
  .brand-lockup .name {
    font-weight: 600;
    font-size: 15px;
    letter-spacing: -0.01em;
    line-height: 1.2;
  }
  .brand-lockup .name .sub {
    display: block;
    font-weight: 400;
    font-size: 11px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.04em;
    text-transform: uppercase;
    margin-top: 3px;
  }

  .brand-hero {
    margin-top: auto;
    margin-bottom: auto;
    max-width: 460px;
  }
  .brand-hero .eye {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.55);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 20px;
  }
  .brand-hero h1 {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 44px;
    line-height: 1.15;
    margin: 0 0 22px;
    letter-spacing: -0.02em;
    color: white;
  }
  .brand-hero h1 em {
    font-style: italic;
    color: var(--amber);
    font-weight: 500;
  }
  .brand-hero p {
    font-size: 14.5px;
    line-height: 1.65;
    color: rgba(255,255,255,0.72);
    margin: 0 0 28px;
  }

  /* Stat row */
  .stat-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 28px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.12);
  }
  .stat-row .s .n {
    font-family: 'Newsreader', serif;
    font-size: 28px;
    font-weight: 500;
    color: white;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .stat-row .s .l {
    font-size: 11.5px;
    color: rgba(255,255,255,0.55);
    margin-top: 8px;
    line-height: 1.4;
  }

  .foot {
    display: flex; align-items: center; gap: 14px;
    font-size: 11.5px;
    color: rgba(255,255,255,0.45);
    font-family: 'JetBrains Mono', monospace;
  }
  .foot .sep { color: rgba(255,255,255,0.2); }

  /* ===== Sign-in card (centered) ===== */
  .form-side {
    background: var(--paper);
    padding: 56px 64px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    border-radius: 16px;
    width: 100%;
    max-width: 520px;
    box-shadow: 0 24px 64px -16px rgba(11,46,92,0.28);
  }
  .signin {
    width: 100%;
    max-width: 380px;
  }
  .signin .eye {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-3);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    margin-bottom: 14px;
  }
  .signin h2 {
    font-family: 'Newsreader', serif;
    font-weight: 500;
    font-size: 32px;
    color: var(--ink);
    margin: 0 0 10px;
    letter-spacing: -0.015em;
    line-height: 1.15;
  }
  .signin .deck {
    font-size: 13.5px;
    color: var(--ink-2);
    margin: 0 0 30px;
    line-height: 1.55;
  }

  .sso-btn {
    width: 100%;
    height: 46px;
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center; gap: 12px;
    font-weight: 500;
    color: var(--ink);
    font-size: 14px;
    cursor: pointer;
    transition: border-color .12s, box-shadow .12s;
  }
  .sso-btn:hover { border-color: var(--navy); box-shadow: 0 0 0 3px rgba(11,46,92,0.06); }
  .sso-btn .key {
    width: 22px; height: 22px;
    background: var(--navy);
    border-radius: 5px;
    display: grid; place-items: center;
    font-family: 'Newsreader', serif;
    color: white;
    font-weight: 600;
    font-size: 12px;
  }
  .sso-btn .arr { color: var(--ink-3); margin-left: auto; font-size: 14px; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 24px 0;
    color: var(--ink-3);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .divider::before,
  .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--line);
  }

  .signin form { display: flex; flex-direction: column; gap: 14px; }
  .signin .row { display: flex; align-items: center; gap: 10px; }
  .signin .between {
    display: flex; justify-content: space-between; align-items: center;
    font-size: 12px;
  }
  .signin .between .link { color: var(--navy); font-weight: 500; }
  .signin .check {
    display: flex; align-items: center; gap: 6px;
    color: var(--ink-2);
  }
  .signin .check .box {
    width: 14px; height: 14px;
    border: 1.5px solid var(--ink-3);
    border-radius: 3px;
    display: grid; place-items: center;
  }
  .signin .check .box.on {
    background: var(--navy);
    border-color: var(--navy);
    color: white;
    font-size: 9px;
    font-weight: 700;
  }

  .signin button.primary {
    width: 100%;
    height: 46px;
    border-radius: 8px;
    border: none;
    background: var(--navy);
    color: white;
    font-weight: 600;
    font-size: 14px;
    cursor: pointer;
    margin-top: 6px;
    letter-spacing: 0.01em;
  }
  .signin button.primary:hover { background: var(--navy-2); }

  .role-hint {
    background: white;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 12px 14px;
    margin-top: 24px;
    font-size: 11.5px;
    color: var(--ink-2);
    line-height: 1.5;
  }
  .role-hint .h {
    color: var(--ink);
    font-weight: 600;
    font-size: 12px;
    margin-bottom: 2px;
  }
  .role-hint .roles {
    display: flex; gap: 6px;
    margin-top: 8px;
  }
  .role-hint .roles .r {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    padding: 2px 7px;
    background: var(--navy-tint);
    color: var(--navy);
    border-radius: 4px;
  }

  .form-foot {
    margin-top: 36px;
    text-align: center;
    font-size: 11.5px;
    color: var(--ink-3);
  }
  .form-foot a { color: var(--ink-2); text-decoration: underline; text-underline-offset: 2px; }
</style>
</head>
<body data-screen-label="00 Login">
  <div class="split">

    <!-- Sign in -->
    <main class="form-side">
      <div class="signin">
        <div class="eye">Sign in</div>
        <h2>Welcome back.</h2>
        <p class="deck">Use your Monash staff account, or sign in with email if you've been invited as an external reviewer.</p>

        <button class="sso-btn">
          <span class="key">M</span>
          <span>Continue with Monash Authcate</span>
          <span class="arr">›</span>
        </button>

        <div class="divider">or sign in with email</div>

        <form>
          <label class="field">
            <span class="lbl">Staff email</span>
            <input class="input lg" type="email" value="elise.chen@monash.edu">
          </label>
          <label class="field">
            <span class="lbl">Password</span>
            <input class="input lg" type="password" value="••••••••••••">
          </label>

          <div class="between">
            <span class="check">
              <span class="box on">✓</span>
              Keep me signed in
            </span>
            <a href="#" class="link">Forgot password?</a>
          </div>

          <button type="button" class="primary">Sign in</button>
        </form>

        <div class="form-foot">
          Need access? <a href="05 - Admin.html">Contact your faculty admin</a>
          &nbsp;·&nbsp; <a href="index.html">Back to all screens</a>
        </div>
      </div>
    </main>

  </div>
</body>
</html>
